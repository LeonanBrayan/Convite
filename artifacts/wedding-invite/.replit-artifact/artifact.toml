kind = "web"
previewPath = "/"
title = "Convite de Casamento - Leonan & Stephani"
version = "1.0.0"
id = "artifacts/wedding-invite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24366
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/wedding-invite run dev"

[services.env]
PORT = "24366"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/wedding-invite", "run", "build"]
publicDir = "artifacts/wedding-invite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
